name: Security Scanning - CI/CD Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
      
      - name: Type check with mypy
        run: mypy xssgen.py lib_*.py --ignore-missing-imports --no-error-summary || true
      
      - name: Security check with bandit
        run: bandit -r . -f json -o bandit-report.json || true
      
      - name: Dependency vulnerability check
        run: safety check --json || true
      
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-reports-py${{ matrix.python-version }}
          path: |
            bandit-report.json
            .audit_logs/

  test:
    runs-on: ubuntu-latest
    needs: security-scan
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run unit tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: autoxss:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build
    
    if: github.event_name == 'push'
    
    services:
      test-server:
        image: vulnerables/web-dvwa:latest
        ports:
          - 80:80
        options: >-
          --health-cmd="curl -f http://localhost/" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Wait for test server
        run: |
          timeout 30 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" http://localhost/ || echo 000)" != "200" && "$(curl -s -o /dev/null -w "%{http_code}" http://localhost/ || echo 000)" != "302" ]]; do sleep 1; done' || true
      
      - name: Run quick XSS scan on DVWA
        run: |
          python xssgen.py http://localhost/vulnerabilities/xss_r/ --mode quick --profile quick --timeout 5 || true
        continue-on-error: true

  publish-artifacts:
    runs-on: ubuntu-latest
    needs: [security-scan, test]
    
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
      
      - name: Upload to releases (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: security-reports-*/**
