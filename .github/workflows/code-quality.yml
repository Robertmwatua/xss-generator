name: Code Quality & Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Format check with black
        run: black --check xssgen.py lib_*.py
        continue-on-error: true
      
      - name: Sort imports with isort
        run: isort --check-only xssgen.py lib_*.py
        continue-on-error: true
      
      - name: Lint with pylint
        run: pylint xssgen.py lib_*.py --exit-zero --max-line-length=100
      
      - name: Type hints check
        run: mypy xssgen.py lib_*.py --ignore-missing-imports --no-error-summary || true

  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run pytest
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing || true
      
      - name: Generate coverage badge
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: htmlcov/
